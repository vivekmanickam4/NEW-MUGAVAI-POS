<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Billing</title>

  <!-- STYLES -->
  <link rel="stylesheet" href="style.css" />
</head>
<button onclick="clearBill()">🧹 Clear Bill</button>
<button onclick="goBack()">⬅ Back</button>
<body>

  <h1>Billing</h1>

  <!-- INPUTS -->
  <input id="barcodeInput" placeholder="Scan barcode" />
  <input id="customerName" placeholder="Customer Name" />

  <!-- INVOICE SECTION -->
  <div id="invoice" style="border:2px solid black; padding:20px;">

    <h3>
      Invoice: <span id="invNo"></span>
    </h3>

    <!-- BILL TABLE -->
    <table
      id="billTable"
      border="1"
      width="80%"
      style="margin:auto; border-collapse:collapse; text-align:center;"
    >
      <tr>
        <th>Name</th>
        <th>Qty</th>
        <th>Price</th>
        <th>GST</th>
        <th>Total</th>
        <th>Action</th>
      </tr>
    </table>

    <!-- TOTAL -->
    <h3>
      Total ₹<span id="total">0</span>
    </h3>

  </div>

  <!-- ACTION BUTTONS -->
  <button onclick="saveBill()">Save Bill</button>
  <button onclick="printInvoice()">Print</button>

  <!-- SCRIPT -->
  <script type="module" src="js/billing.js"></script>

</body>
</html>
