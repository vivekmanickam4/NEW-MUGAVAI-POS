<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Billing</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<button onclick="goBack()">⬅ Back</button>
<button onclick="clearBill()">🧹 Clear Bill</button>

<h1>Billing</h1>

<!-- 🔥 CONTROLS -->
<div class="billing-controls">
  <input id="barcodeInput" placeholder="Scan barcode" />
  <input id="customerName" placeholder="Customer Name" />

  <!-- ✅ GST TOGGLE -->
  <label class="toggle">
    <input type="checkbox" id="gstToggle" checked />
    Include GST
  </label>
</div>

<!-- INVOICE -->
<div id="invoice" style="border:2px solid black; padding:20px;">

  <h2>My Store</h2>
  <p>GST No: 22AAAAA0000A1Z5</p>

  <h3>Invoice: <span id="invNo"></span></h3>

  <table id="billTable">
    <tr>
      <th>Name</th>
      <th>Qty</th>
      <th>Price</th>
      <th>GST</th>
      <th>Total</th>
      <th>Action</th>
    </tr>
  </table>

  <!-- ✅ TOTAL BREAKDOWN -->
  <p>Subtotal: ₹<span id="subtotal">0</span></p>

  <p id="gstRow">
    GST: ₹<span id="gstTotal">0</span>
  </p>

  <h3>Total ₹<span id="total">0</span></h3>

</div>

<button onclick="saveBill()">Save Bill</button>
<button onclick="printInvoice()">Print</button>

<script type="module" src="js/billing.js"></script>

</body>
</html>
