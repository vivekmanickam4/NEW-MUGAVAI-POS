<!DOCTYPE html>
<html>
<body>

<h1>Dashboard</h1>

<a href="#" onclick="showSection('products')">Products</a> |
<a href="#" onclick="showSection('billing')">Billing</a> |
<a href="history.html">Bill History</a> |
<a href="reports.html">Reports</a>

<hr>

<!-- PRODUCTS -->
<div id="productsSection">
  <h2>Add Product</h2>

  <input id="barcode" placeholder="Barcode">
  <input id="productName" placeholder="Name">
  <input id="productPrice" placeholder="Price">
  <input id="gst" placeholder="GST %">

  <button onclick="addProduct()">Add</button>

  <h3>Products</h3>

  <!-- ✅ THIS WAS MISSING -->
  <div id="productList"></div>
</div>

<!-- BILLING -->
<div id="billingSection" style="display:none;">
  <h2>Billing</h2>

  <input id="customerName" placeholder="Customer Name">
  <input id="barcodeInput" placeholder="Scan Barcode">

  <div id="invoice" style="border:2px solid black; padding:20px;">
    
    <h3>Invoice: <span id="invNo"></span></h3>

   <table border="1" width="100%" id="billTable" style="border-collapse:collapse; text-align:center;">
  <tr>
    <th>Name</th>
    <th>Price</th>
    <th>GST</th>
    <th>Total</th>
    <th>Action</th>
  </tr>
</table>

    <h3>Total ₹<span id="total">0</span></h3>
  </div>

  <button onclick="saveBill()">Save</button>
</div>
  
<button onclick="logout()">Logout</button>

<script>
function showSection(sec){
  productsSection.style.display="none";
  billingSection.style.display="none";

  if(sec==="products") productsSection.style.display="block";
  if(sec==="billing") billingSection.style.display="block";
}

function logout(){
  localStorage.clear();
  location.href="index.html";
}
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script type="module" src="js/firebase.js"></script>

</body>
</html>
