<!DOCTYPE html>
<html>
<body>

<h1>Dashboard</h1>

<!-- Menu -->
<a href="#" onclick="showSection('products')">Products</a> |
<a href="#" onclick="showSection('billing')">Billing</a>

<hr>

<!-- PRODUCTS SECTION -->
<div id="productsSection" style="display:none;">
  <h2>Add Product</h2>

  <input type="text" id="barcode" placeholder="Barcode">
  <input type="text" id="productName" placeholder="Product Name">
  <input type="number" id="productPrice" placeholder="Price">
  <input type="number" id="gst" placeholder="GST %">

  <button onclick="addProduct()">Add Product</button>

  <h3>Product List</h3>
  <ul id="productList"></ul>
</div>

<!-- BILLING SECTION -->
<div id="billingSection" style="display:none;">
  <h2>Billing</h2>

  <ul id="billList"></ul>

  <h3>Total: ₹<span id="total">0</span></h3>
</div>
<a href="history.html">Bill History</a>
<!-- Script -->

<script>
function showSection(section) {
  document.getElementById("productsSection").style.display = "none";
  document.getElementById("billingSection").style.display = "none";

  if (section === "products") {
    document.getElementById("productsSection").style.display = "block";
  } else if (section === "billing") {
    document.getElementById("billingSection").style.display = "block";
  }
}
</script>
  
<button onclick="logout()">Logout</button>

<script>
function logout(){
  localStorage.clear();
  location.href="index.html";
}
</script>
<script type="module" src="js/firebase.js"></script>

<script>
showSection('products');
loadProducts();
</script>
</body>
</html>
