<!DOCTYPE html>
<html>

<head>
  <title>Products</title>
  <link rel="stylesheet" href="style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    #dropdown {
      border: 1px solid #ccc;
      max-height: 150px;
      overflow-y: auto;
      width: 250px;
      position: absolute;
      background: white;
      z-index: 1000;
    }

    #dropdown div {
      padding: 8px;
      cursor: pointer;
    }

    #dropdown div:hover,
    .active {
      background: #ddd;
    }
  </style>
</head>

<body>

<button onclick="goBack()">⬅ Back</button>

<h1>Products</h1>

<!-- 🔍 SEARCH -->
<input id="search" placeholder="Search / Scan Barcode" autocomplete="off">
<div id="dropdown"></div>

<!-- ➕ ADD PRODUCT -->
<div id="adminPanel">
  <input id="productName" placeholder="Name">
  <input id="productPrice" placeholder="Price">
  <input id="gst" placeholder="GST %">
  <input id="barcode" placeholder="Barcode">
  <button onclick="addProduct()">Add</button>
</div>

<!-- 📋 TABLE -->
<table border="1" id="table" style="margin-top:20px; border-collapse:collapse; width:100%; text-align:center;">
</table>

<script type="module" src="js/products.js"></script>

</body>
</html>
